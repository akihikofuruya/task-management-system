<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | タスク管理</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="auth-panel">
    <h1>ログイン</h1>
    <p class="muted">メールアドレスとパスワードを入力してください。</p>
    <div id="message" class="message"></div>
    <form id="loginForm">
        <div class="field">
            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" maxlength="255" required>
        </div>
        <div class="field">
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" minlength="8" maxlength="20" required>
        </div>
        <div class="actions">
            <button type="submit">ログイン</button>
            <a class="button secondary" href="/register">ユーザー登録</a>
        </div>
    </form>
</main>
<script>
const form = document.getElementById('loginForm');
const message = document.getElementById('message');

function showMessage(text, type) {
    message.textContent = text;
    message.className = `message is-${type}`;
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: form.email.value,
            password: form.password.value
        })
    });

    if (!response.ok) {
        showMessage('ログインに失敗しました。入力内容を確認してください。', 'error');
        return;
    }

    const data = await response.json();
    localStorage.setItem('accessToken', data.accessToken);
    localStorage.setItem('userId', data.userId);
    localStorage.setItem('userName', data.userName);
    location.href = '/tasks';
});
</script>
</body>
</html>
